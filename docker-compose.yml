services:
  pencil-sync:
    build: .
    volumes:
      # Mount your project directory (adjust path as needed).
      # On Linux: ensure the directory is owned by UID 1000 (node user).
      - ../:/project
      # Mount config file
      - ./pencil-sync.config.json:/app/pencil-sync.config.json:ro
    working_dir: /project
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    # host networking is required so the container can reach the Pencil MCP server
    # running on the host (typically localhost:PORT). Restrict MCP server binding to
    # 127.0.0.1 on the host to avoid exposing it on public interfaces.
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "node", "dist/index.js", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: ["watch", "--config", "/app/pencil-sync.config.json"]
